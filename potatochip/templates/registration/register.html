{% extends "base.html" %}
{% load static %}
{% block head_extra %}
<link rel="stylesheet" href="{% static 'potatochip/css/register.css' %}">
{% endblock %}

{% block content %}
<div class="box">
    <div class="logo">
        <img src="{% static 'potatochip/img/logo-main.svg' %}" width="300"
            alt="A goldfinch saying the words 'Potato Chip!'">
    </div>
    <h2>Create an account</h2>

    {% if form.errors %}
    <p>Please fix the errors below.</p>
    {% endif %}

    <form method="post" action="{% url 'register' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Register</button>
    </form>

    <p><a href="{% url 'login' %}">Back to login</a></p>
</div>
{% endblock %}
